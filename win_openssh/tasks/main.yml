---
# tasks file for win_openssh
- name: Run basic PowerShell script
  become: yes
  become_user: yks21adm
  ansible.windows.win_powershell:
    script: |
      Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0
      start-service sshd
      Set-Service -Name sshd -StartupType 'Automatic'
      get-service sshd
  register: result
# - debug: result.stdout_lines

- name: Show PS_output
  debug:
    var: result

